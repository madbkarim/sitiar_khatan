<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadan Quran Reading Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:wght@400;500&family=Poppins:wght@400;500;600&display=swap');

        :root {
            --primary: #d4af37;
            --dark-bg: #0f1419;
            --card-bg: #1a1f2e;
            --accent: #e8d5c4;
            --text-primary: #f5f1e8;
            --text-secondary: #b8b3a8;
            --success: #7cc576;
            --border: #2d3340;
            --hover: #252d3d;
        }

        body {
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 50%, #141820 100%);
            color: var(--text-primary);
            font-family: 'Lora', serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Decorative background elements */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.03) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            left: -5%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(232, 213, 196, 0.02) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            padding-top: 40px;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 50px;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-decoration {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .star {
            width: 3px;
            height: 3px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--primary);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-shadow: 0 4px 20px rgba(212, 175, 55, 0.2);
        }

        .subtitle {
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
            font-weight: 500;
        }

        /* Stats */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .stat-label {
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        /* Reader Card */
        .reader-card {
            background: linear-gradient(135deg, var(--card-bg) 0%, rgba(29, 35, 48, 0.8) 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            animation: cardFadeIn 0.6s ease-out backwards;
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reader-card:nth-child(1) { animation-delay: 0.1s; }
        .reader-card:nth-child(2) { animation-delay: 0.15s; }
        .reader-card:nth-child(3) { animation-delay: 0.2s; }
        .reader-card:nth-child(4) { animation-delay: 0.25s; }
        .reader-card:nth-child(5) { animation-delay: 0.3s; }
        .reader-card:nth-child(6) { animation-delay: 0.35s; }
        .reader-card:nth-child(7) { animation-delay: 0.4s; }
        .reader-card:nth-child(8) { animation-delay: 0.45s; }
        .reader-card:nth-child(9) { animation-delay: 0.5s; }

        .reader-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .reader-card:hover::before {
            left: 100%;
        }

        .reader-card:hover {
            border-color: var(--primary);
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.15);
            transform: translateY(-5px);
        }

        .reader-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .reader-number {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), #e5a84b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--dark-bg);
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
        }

        .reader-info h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            margin-bottom: 5px;
            color: var(--accent);
        }

        .reader-info p {
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        /* Week Rows */
        .weeks-container {
            position: relative;
            z-index: 1;
        }

        .week {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            align-items: center;
        }

        .week-label {
            font-family: 'Poppins', sans-serif;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 50px;
            font-weight: 600;
        }

        /* Checkbox */
        .day-box {
            flex: 1;
            position: relative;
        }

        .day-checkbox {
            display: none;
        }

        .day-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 8px;
            background: var(--border);
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .day-label::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: var(--primary);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
            z-index: -1;
        }

        .day-checkbox:checked + .day-label {
            background: var(--success);
            color: var(--dark-bg);
            border-color: var(--success);
            font-weight: 600;
        }

        .day-checkbox:checked + .day-label::before {
            width: 100%;
            height: 100%;
        }

        .day-label:hover {
            border-color: var(--primary);
            transform: scale(1.05);
        }

        /* Progress Bar */
        .progress-section {
            position: relative;
            z-index: 1;
            margin-top: 20px;
        }

        .progress-label {
            font-family: 'Poppins', sans-serif;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #e5a84b);
            border-radius: 3px;
            transition: width 0.4s ease;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid var(--border);
            margin-top: 50px;
            animation: fadeIn 1s ease-out 1s both;
        }

        footer p {
            font-family: 'Poppins', sans-serif;
            color: var(--text-secondary);
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .crescent-moon {
            display: inline-block;
            margin: 0 8px;
            color: var(--primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
                padding-top: 25px;
            }

            h1 {
                font-size: 2.5rem;
                letter-spacing: 2px;
            }

            .grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .stats-container {
                grid-template-columns: repeat(3, 1fr);
                gap: 15px;
            }

            .stat-card {
                padding: 15px;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .day-label {
                font-size: 0.75rem;
                padding: 8px 6px;
            }

            .reader-card {
                padding: 20px;
            }

            .reader-info h2 {
                font-size: 1.3rem;
            }

            header {
                margin-bottom: 30px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
                letter-spacing: 1px;
            }

            .subtitle {
                font-size: 0.9rem;
            }

            .stats-container {
                grid-template-columns: repeat(2, 1fr);
            }

            .week {
                flex-wrap: wrap;
            }

            .day-label {
                flex: 1;
                min-width: 45%;
            }
        }

        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Accessibility */
        .day-checkbox:focus + .day-label {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-decoration">
                <span class="star"></span>
                <span class="star"></span>
                <span class="star"></span>
            </div>
            <h1>قرآن</h1>
            <p class="subtitle">Ramadan Reading Tracker</p>
        </header>

        <!-- Stats -->
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-value" id="totalDays">0</div>
                <div class="stat-label">Days Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalJuz">0/9</div>
                <div class="stat-label">Juz Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completionPercent">0%</div>
                <div class="stat-label">Overall Progress</div>
            </div>
        </div>

        <!-- Reader Cards -->
        <div class="grid" id="readersContainer"></div>

        <!-- Footer -->
        <footer>
            <p>
                <span class="crescent-moon">☪</span>
                May your Quran reading be beneficial and accepted
                <span class="crescent-moon">☪</span>
            </p>
            <p style="margin-top: 15px; font-size: 0.8rem;">Local data saved automatically</p>
        </footer>
    </div>

    <script>
        // Reader data with 9 names, each reading 1 juz over 3 weeks
        const readers = [
            {
                id: 1,
                name: "Aisha",
                juz: "1",
                weeks: [
                    { label: "Week 1", days: 7 },
                    { label: "Week 2", days: 7 },
                    { label: "Week 3", days: 7 }
                ]
            },
            {
                id: 2,
                name: "Fatima",
                juz: "2",
                weeks: [
                    { label: "Week 1", days: 7 },
                    { label: "Week 2", days: 7 },
                    { label: "Week 3", days: 7 }
                ]
            },
            {
                id: 3,
                name: "Zainab",
                juz: "3",
                weeks: [
                    { label: "Week 1", days: 7 },
                    { label: "Week 2", days: 7 },
                    { label: "Week 3", days: 7 }
                ]
            },
            {
                id: 4,
                name: "Mariam",
                juz: "4",
                weeks: [
                    { label: "Week 1", days: 7 },
                    { label: "Week 2", days: 7 },
                    { label: "Week 3", days: 7 }
                ]
            },
            {
                id: 5,
                name: "Noor",
                juz: "5",
                weeks: [
                    { label: "Week 1", days: 7 },
                    { label: "Week 2", days: 7 },
                    { label: "Week 3", days: 7 }
                ]
            },
            {
                id: 6,
                name: "Layla",
                juz: "6",
                weeks: [
                    { label: "Week 1", days: 7 },
                    { label: "Week 2", days: 7 },
                    { label: "Week 3", days: 7 }
                ]
            },
            {
                id: 7,
                name: "Hana",
                juz: "7",
                weeks: [
                    { label: "Week 1", days: 7 },
                    { label: "Week 2", days: 7 },
                    { label: "Week 3", days: 7 }
                ]
            },
            {
                id: 8,
                name: "Leena",
                juz: "8",
                weeks: [
                    { label: "Week 1", days: 7 },
                    { label: "Week 2", days: 7 },
                    { label: "Week 3", days: 7 }
                ]
            },
            {
                id: 9,
                name: "Salma",
                juz: "9",
                weeks: [
                    { label: "Week 1", days: 7 },
                    { label: "Week 2", days: 7 },
                    { label: "Week 3", days: 7 }
                ]
            }
        ];

        // Storage key
        const STORAGE_KEY = "quran-tracker-data";

        // Load data from localStorage
        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            return saved ? JSON.parse(saved) : {};
        }

        // Save data to localStorage
        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        // Initialize tracker
        function initializeTracker() {
            const container = document.getElementById("readersContainer");
            const data = loadData();

            readers.forEach(reader => {
                const card = document.createElement("div");
                card.className = "reader-card";

                let weekHtml = "";
                let totalDays = 0;
                let completedDays = 0;

                reader.weeks.forEach((week, weekIndex) => {
                    weekHtml += `<div class="week">
                        <div class="week-label">${week.label}</div>`;

                    for (let day = 1; day <= week.days; day++) {
                        totalDays++;
                        const checkboxId = `reader-${reader.id}-week-${weekIndex}-day-${day}`;
                        const isChecked = data[checkboxId] || false;
                        if (isChecked) completedDays++;

                        weekHtml += `
                            <div class="day-box">
                                <input 
                                    type="checkbox" 
                                    id="${checkboxId}" 
                                    class="day-checkbox" 
                                    ${isChecked ? 'checked' : ''}
                                    onchange="updateProgress()">
                                <label for="${checkboxId}" class="day-label">D${day}</label>
                            </div>`;
                    }
                    weekHtml += `</div>`;
                });

                const progress = totalDays > 0 ? (completedDays / totalDays) * 100 : 0;

                card.innerHTML = `
                    <div class="reader-header">
                        <div class="reader-number">${reader.id}</div>
                        <div class="reader-info">
                            <h2>${reader.name}</h2>
                            <p>Juz ${reader.juz}</p>
                        </div>
                    </div>
                    <div class="weeks-container">
                        ${weekHtml}
                    </div>
                    <div class="progress-section">
                        <div class="progress-label">
                            <span>Progress</span>
                            <span>${completedDays}/${totalDays}</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // Update overall statistics
        function updateProgress() {
            const data = loadData();

            // Collect all checkboxes
            const allCheckboxes = document.querySelectorAll(".day-checkbox");
            let totalChecked = 0;

            allCheckboxes.forEach(checkbox => {
                if (checkbox.checked) {
                    data[checkbox.id] = true;
                    totalChecked++;
                } else {
                    delete data[checkbox.id];
                }

                // Update progress bars for each reader
                const match = checkbox.id.match(/reader-(\d+)-/);
                if (match) {
                    const readerId = match[1];
                    updateReaderProgress(readerId);
                }
            });

            // Save data
            saveData(data);

            // Update stats
            document.getElementById("totalDays").textContent = totalChecked;

            // Count completed juz (all 21 days = 1 juz)
            let completedJuz = 0;
            readers.forEach(reader => {
                let readerCompleted = true;
                for (let weekIndex = 0; weekIndex < reader.weeks.length; weekIndex++) {
                    for (let day = 1; day <= reader.weeks[weekIndex].days; day++) {
                        const checkboxId = `reader-${reader.id}-week-${weekIndex}-day-${day}`;
                        if (!data[checkboxId]) {
                            readerCompleted = false;
                            break;
                        }
                    }
                    if (!readerCompleted) break;
                }
                if (readerCompleted) completedJuz++;
            });

            document.getElementById("totalJuz").textContent = `${completedJuz}/9`;

            const totalDaysInTracker = 9 * 21; // 9 readers * 21 days each
            const completionPercent = Math.round((totalChecked / totalDaysInTracker) * 100);
            document.getElementById("completionPercent").textContent = `${completionPercent}%`;
        }

        // Update individual reader's progress bar
        function updateReaderProgress(readerId) {
            const cards = document.querySelectorAll(".reader-card");
            const card = cards[readerId - 1];

            if (!card) return;

            const checkboxes = card.querySelectorAll(".day-checkbox");
            let checkedCount = 0;

            checkboxes.forEach(checkbox => {
                if (checkbox.checked) checkedCount++;
            });

            const progress = (checkedCount / checkboxes.length) * 100;
            const progressFill = card.querySelector(".progress-fill");
            const progressLabel = card.querySelector(".progress-label span:last-child");

            if (progressFill) {
                progressFill.style.width = progress + "%";
            }
            if (progressLabel) {
                progressLabel.textContent = `${checkedCount}/${checkboxes.length}`;
            }
        }

        // Initialize on page load
        window.addEventListener("DOMContentLoaded", () => {
            initializeTracker();
            updateProgress();
        });
    </script>
</body>
</html>
